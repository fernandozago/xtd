name: Run tests

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read

jobs:
  tests:
    name: GCC 15 tests
    runs-on: ubuntu-latest

    container:
      image: gcc:15

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      # The GCC container normally exposes "g++".
      # This creates "g++-15" if your all.sh script uses that name.
      - name: Configure compiler
        run: |
          if ! command -v g++-15 >/dev/null 2>&1; then
            ln -s "$(command -v g++)" /usr/local/bin/g++-15
          fi

          g++-15 --version

      - name: Make test script executable
        run: chmod +x ./tests/all.sh

      - name: Run tests
        run: ./tests/all.sh
