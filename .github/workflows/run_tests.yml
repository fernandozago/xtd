permissions:
  contents: read

jobs:
  tests:
    name: GCC 15 tests
    runs-on: ubuntu-latest
    container:
      image: gcc:15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Configure compiler
        run: |
          if ! command -v g++-15 >/dev/null 2>&1; then
            ln -s "$(command -v g++)" /usr/local/bin/g++-15
          fi

      - name: Run tests
        run: |
          chmod +x ./tests/all.sh
          ./tests/all.sh

  benchmarks:
    name: GCC 15 benchmarks
    needs: tests

    # Do not push from pull requests or non-main workflow dispatches.
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'

    permissions:
      contents: write

    concurrency:
      group: benchmark-results-main
      cancel-in-progress: true

    runs-on: ubuntu-latest
    container:
      image: gcc:15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Configure compiler and locale
        run: |
          if ! command -v g++-15 >/dev/null 2>&1; then
            ln -s "$(command -v g++)" /usr/local/bin/g++-15
          fi

          apt-get update
          apt-get install -y --no-install-recommends locales
          echo "en_US.UTF-8 UTF-8" >> /etc/locale.gen
          locale-gen en_US.UTF-8

      - name: Run benchmarks
        run: |
          chmod +x ./benchmarks/all.sh
          ./benchmarks/all.sh

      - name: Commit benchmark results
        run: |
          if [[ -z "$(git status --porcelain -- benchmarks/results)" ]]; then
            echo "Benchmark results did not change."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"

          git add benchmarks/results/

          # Protect against unusual ignored/untracked-file situations.
          if git diff --cached --quiet; then
            echo "Nothing to commit."
            exit 0
          fi

          git commit \
            -m "chore(benchmarks): update benchmark results [skip ci]"

          git push origin HEAD:main